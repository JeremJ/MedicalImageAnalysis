openapi: 3.0.0
info:
  version: 0.0.1
  title: Medical Image Analysis API
  description: REST API Documentation
  termsOfService: https://medical-image-analysis.com/terms-of-use
  contact:
    name: Medical Image Analysis API Support
    email: support@medical-image-analysis.com
servers:
  - url: https://api.medical-image-analysis.com/v1
    description: Production server
  - url: https://api-dev.medical-image-analysis.com/v1
    description: Internal staging server for testing
paths:
  /api/v1/users/{userId}:
    get:
      tags:
        - Users
      summary: Return User
      operationId: getUser
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Data of specified user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                user:
                  $ref: '#/components/examples/user'
        404:
          $ref: '#/components/responses/UserNotFound'
  /api/v1/users:
    get:
      tags:
        - Users
      summary: Return Users
      operationId: getUsers
      parameters:
        - in: query
          name: pageable
          required: false
          schema:
            type: object
            properties:
              page:
                type: integer
              size:
                type: integer
      responses:
        200:
          description: Basic Data users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BasicUser'
              examples:
                basicUsers:
                  $ref: '#/components/examples/basicUsers'
        404:
          $ref: '#/components/responses/UserNotFound'
  /api/v1/users/{userId}/medical-images:
    get:
      tags:
        - Users
      summary: Return User medical images
      operationId: getUserMedicalImages
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: query
          name: pageable
          required: false
          schema:
            type: object
            properties:
              page:
                type: integer
              size:
                type: integer
      responses:
        200:
          description: List of specified user medical images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExtendedMedicalImageResponse'
              examples:
                medicalImagesExtendedResponseExample:
                  $ref: '#/components/examples/medicalImagesExtendedResponseExample'
    post:
      tags:
        - Users
      summary: Create medical images
      operationId: createMedicalImages
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        description: Medical images
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MedicalImage'
      responses:
        201:
          description: Create image successfully
  /api/v1/users/{userId}/medical-images/{imageId}:
    get:
      tags:
        - Users
      summary: Return user medical image
      operationId: getMedicalImage
      parameters:
        - in: path
          name: imageId
          required: true
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Get medical image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalImageResponse'
              examples:
                medicalImageResponseExample:
                  $ref: '#/components/examples/medicalImageResponseExample'
  /api/v1/medical-images:
    get:
      tags:
        - Medical Images
      summary: Return medical images
      operationId: getMedicalImages
      parameters:
        - in: query
          name: pageable
          required: false
          schema:
            type: object
            properties:
              page:
                type: integer
              size:
                type: integer
      responses:
        200:
          description: List medical images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExtendedMedicalImageResponse'
              examples:
                medicalImagesExtendedResponseExample:
                  $ref: '#/components/examples/medicalImagesResponseExample'
