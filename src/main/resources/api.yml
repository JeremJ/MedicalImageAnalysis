  schemas:
    User:
      type: object
      description: All user data
      required:
        - username
        - firstName
        - lastName
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        firstName:
          type: string
        role:
          type: string
          enum:
            - ADMIN
            - DOCTOR
            - PATIENT
        email:
          type: string
        country:
          type: string
        city:
          type: string
        phone:
          type: string
        zipCode:
          type: string
        avatar:
          type: string
    BasicUser:
      type: object
      description: Basic user data
      required:
        - username
        - firstName
        - lastName
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        avatar:
          type: string
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date
        error:
          type: string
        path:
          type: string
    MedicalImage:
      type: object
      required:
        - file
      properties:
        files:
          description: File to upload
          type: string
          format: binary
        description:
          description: Image description
          type: string
    MedicalImageResponse:
      type: object
      required:
        - id
        - size
        - date
      properties:
        id:
          type: integer
          format: int64
        fileName:
          type: string
        date:
          description: Image upload date
          type: string
          format: date-time
          pattern: yyyy-MM-dd'T'HH:mm:ssZ
          example: '2017-07-21T17:32:28Z'
        size:
          description: file size in bytes
          type: integer
          format: int64
        fileExtension:
          description: file extension png,jpg,dicom
          type: string
        file:
          description: file in base64 format
          type: string
        diseaseProbability:
          description: probabilty of disease on image
          type: number
          format: double
    ExtendedMedicalImageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: userImage ID
      allOf:
        - $ref: '#/components/schemas/MedicalImageResponse'
        - type: object
  responses:
    UserNotFound:
      description: User Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            userNotFoundExample:
              $ref: '#/components/examples/userNotFoundExample'